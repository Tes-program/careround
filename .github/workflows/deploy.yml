name: Build, Test, and Deploy

on:
  push:
    branches:
      - main

jobs:

  # ── Job 1: Build and test all modules ─────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      # Compiles, runs tests, and produces jars for all three modules
      - name: Build and verify all modules
        run: mvn clean verify -pl careround-core,careround-notification,careround-audit -am

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            careround-core/target/surefire-reports
            careround-notification/target/surefire-reports
            careround-audit/target/surefire-reports

  # ── Job 2: Build Docker images and push to Docker Hub ─────────────────────
  build-and-push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # Derive a stable tag from the git commit SHA
      - name: Set image tag
        id: image-tag
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # secrets.DOCKER_HUB_USER — Docker Hub username
      # secrets.DOCKER_HUB_TOKEN — Docker Hub access token
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push careround-core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: careround-core/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/careround-core:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USER }}/careround-core:latest

      - name: Build and push careround-notification
        uses: docker/build-push-action@v5
        with:
          context: .
          file: careround-notification/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/careround-notification:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USER }}/careround-notification:latest

      - name: Build and push careround-audit
        uses: docker/build-push-action@v5
        with:
          context: .
          file: careround-audit/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/careround-audit:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USER }}/careround-audit:latest


  # ── Job 3: Deploy to EC2 ───────────────────────────────────────────────────
  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # secrets.ENV_FILE — full contents of production .env file
      - name: Write .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "IMAGE_TAG=${{ needs.build-and-push-images.outputs.image_tag }}" >> .env

      # secrets.EC2_HOST — EC2 public IP or DNS
      # secrets.EC2_USER — SSH user (ec2-user or ubuntu)
      # secrets.EC2_SSH_KEY — PEM private key (multiline secret)
      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,.env,infra/"
          target: "/home/${{ secrets.EC2_USER }}/careround"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/careround
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
            echo "Waiting for core to be healthy..."
            sleep 30
            docker compose -f docker-compose.prod.yml ps

      - name: Smoke test
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            https://${{ secrets.EC2_HOST }}/api/actuator/health || exit 1
