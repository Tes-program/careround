server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: careround-audit
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/careround_audit?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USER:careround}
    password: ${DB_PASS:careround}
    hikari:
      pool-name: AuditPool
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: careround-audit
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
