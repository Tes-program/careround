# Template — replace ${DOMAIN} with your domain, or run through envsubst before use:
#   envsubst '${DOMAIN}' < infra/nginx/ssl.conf > /tmp/ssl.conf

server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/html text/css application/json application/javascript;

    location /actuator/ {
        deny all;
    }

    location /api/ {
        proxy_pass         http://careround-core:8080/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        root  /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
