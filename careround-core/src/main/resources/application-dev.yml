spring:
  datasource:
    url: jdbc:mysql://localhost:3306/careround_core?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:careround}
    password: ${MYSQL_PASSWORD:careround_secret}
    hikari:
      pool-name: CorePool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:1a162d012d4c29724591936c333be3570a0b4d2c931e229af37c9a2a5a274285}

logging:
  level:
    com.careround: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
