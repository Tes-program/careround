server:
  port: -1    # No HTTP — this is a background process only

spring:
  application:
    name: careround-scheduler

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:careround}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:careround}
    password: ${DB_PASS:careround}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: SchedulerHikari
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false    # API module owns migrations; scheduler must NOT re-run them

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

  # Quartz JDBC JobStore — state persisted to MySQL QRTZ_* tables
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never    # Quartz tables created manually (see README)
    properties:
      org:
        quartz:
          scheduler:
            instanceName: CareRoundScheduler
            instanceId: AUTO
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: false    # single instance; set true if running multiple scheduler pods
            dataSource: quartzDS
          dataSource:
            quartzDS:
              driver: com.mysql.cj.jdbc.Driver
              URL: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:careround}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
              user: ${DB_USER:careround}
              password: ${DB_PASS:careround}
              maxConnections: 5

logging:
  config: classpath:logback-spring.xml
